# ============================================================
# Watermark GAN Configuration
# ============================================================

# --- Model Paths ---
model:
  # LLM used by both UPV Generator (server) and Attacker base
  llm_name: "facebook/opt-1.3b"          # Change to "google/gemma-2b" for larger
  device: "cuda"
  
  # UPV watermark config (from MarkLLM)
  upv_config_path: "../MarkLLM/config/UPV.json"
  upv_generator_weights: "../MarkLLM/watermark/upv/model/generator_model_b16_p1.pt"
  upv_detector_weights: "../MarkLLM/watermark/upv/model/detector_model_b16_p1_z4.pt"

# --- UPV Watermark Parameters ---
watermark:
  gamma: 0.5
  delta: 2.0
  z_threshold: 4.0
  prefix_length: 1
  bit_number: 16
  sigma: 0.01
  default_top_k: 20

# --- Discriminator (LSTM Detector) ---
discriminator:
  # Architecture
  embedding_dim: 128              # Shared embedding dimension
  hidden_dim: 256                 # LSTM hidden dimension
  num_lstm_layers: 2              # Num LSTM layers
  dropout: 0.3                    # Dropout rate
  freeze_embedding: true          # Freeze shared embedding layer
  
  # Pre-training
  pretrain_epochs: 20
  pretrain_lr: 0.001
  pretrain_batch_size: 32
  pretrain_num_samples: 10000     # 10k real + 10k natural
  target_f1: 0.95                 # Stop pre-training when F1 > this

# --- Attacker (LLM with LoRA) ---
attacker:
  # LoRA config
  lora_r: 8                       # LoRA rank
  lora_alpha: 16                  # LoRA alpha
  lora_dropout: 0.05              # LoRA dropout
  lora_target_modules:            # Which modules to apply LoRA
    - "q_proj"
    - "v_proj"
  
  # Pre-training (SFT on static spoofer data)
  pretrain_epochs: 3
  pretrain_lr: 0.0002
  pretrain_batch_size: 4
  pretrain_num_samples: 10000     # Generated by static spoofer
  pretrain_max_length: 512
  
  # Learning (from watermark-stealing)
  learning_mode: "fast"           # "fast" or "slow"
  learning_num_queries: 1000      # Queries to learn from
  prevctx_width: 1                # Context width for count store

# --- Adversarial Training ---
adversarial:
  num_epochs: 100                 # Total GAN epochs
  batch_size: 32                  # Prompts per batch
  max_gen_length: 256             # Max generation length
  
  # Discriminator update
  d_steps_per_epoch: 1            # D updates per epoch
  d_lr: 0.0001                    # D learning rate during adversarial

  # Attacker (Generator) update - Policy Gradient
  g_steps_per_epoch: 1            # G updates per epoch
  g_lr: 0.00005                   # G learning rate (LoRA only)
  
  # Reward
  lambda_reward: 1.0              # Weight for Discriminator reward
  lambda_ppl: 0.1                 # Weight for PPL penalty
  reward_baseline: 0.5            # Baseline for variance reduction
  
  # REINFORCE
  num_rollouts: 4                 # Monte Carlo rollouts per sample
  temperature: 1.0                # Sampling temperature
  
  # Checkpointing
  eval_every: 5                   # Evaluate every N epochs
  checkpoint_every: 10            # Save checkpoint every N epochs
  checkpoint_dir: "checkpoints"

# --- Evaluation ---
evaluation:
  # Metrics to track
  track_d_loss: true
  track_spoofing_rate: true
  track_diversity_score: true
  track_ppl: true
  
  # Spoofing evaluation
  num_eval_samples: 100
  
  # Mode collapse detection
  min_unique_tokens_ratio: 0.3    # Alert if unique tokens / total < this

# --- Data ---
data:
  dataset_path: "../MarkLLM/dataset/c4/processed_c4.json"
  max_prompt_length: 128
  num_prompts: 5000               # Total prompts in pool
