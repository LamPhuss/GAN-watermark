# ============================================================
# Watermark GAN Configuration (MC Search + UPV Detector)
#
# FIXES APPLIED:
#   FIX 1: window_size 1 → 3, prefix_length 1 → 3
#   FIX 4: detector pretrain_epochs 20→80, lr 0.001→0.0005,
#          num_samples 5000→10000
#   FIX 5: Added window_size + layers explicitly
#   FIX 6: d_steps_per_epoch 1 → 3
# ============================================================

# --- Model Paths ---
model:
  llm_name: "facebook/opt-1.3b"
  device: "cuda"
  upv_config_path: "upv/UPV.json"
  upv_generator_weights: "upv/model/generator_model_b16_w3.pt"
  upv_detector_weights: "upv/model/detector_model_b16_w3_z4.pt"

# --- UPV Watermark Parameters ---
watermark:
  gamma: 0.5
  delta: 2.0
  z_threshold: 4.0
  prefix_length: 3              # FIX 1: was 1 → now 3 (= window_size)
  window_size: 3                # FIX 5: NEW — explicit, must match Generator
  layers: 5                     # FIX 5: NEW — b_layers for SubNet/Detector
  bit_number: 16
  sigma: 0.01
  default_top_k: 20

# --- UPV Discriminator (Original UPV Detector) ---
discriminator:
  bit_number: 16
  freeze_embedding: true        # CRITICAL: always frozen

  # Pre-training — matched to original repo (detector.py)
  pretrain_epochs: 80           # FIX 4: was 20 → 80
  pretrain_lr: 0.0005           # FIX 4: was 0.001 → 0.0005
  pretrain_batch_size: 32
  pretrain_num_samples: 10000   # FIX 4: was 5000 → 10000
  pretrain_data_mode: "random_tokens"  # FIX 3: "random_tokens" or "llm_text"

# --- Attacker (LLM with LoRA) ---
attacker:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"

  pretrain_epochs: 3
  pretrain_lr: 0.0002
  pretrain_batch_size: 4
  pretrain_num_samples: 5000
  pretrain_max_length: 256

  learning_mode: "fast"
  learning_num_queries: 1000
  prevctx_width: 1

# --- Monte Carlo Search ---
monte_carlo:
  num_chunks: 4
  num_rollouts: 3
  batch_size: 4
  rollout_policy: "static_spoofer"

# --- Adversarial Training ---
adversarial:
  num_epochs: 100
  max_gen_length: 200

  d_steps_per_epoch: 3          # FIX 6: was 1 → 3 (D needs more steps than G)
  d_lr: 0.0005

  g_steps_per_epoch: 1
  g_lr: 0.00005

  lambda_reward: 1.0
  lambda_ppl: 0.1
  reward_baseline: 0.5

  temperature: 1.0

  eval_every: 5
  checkpoint_every: 10
  checkpoint_dir: "checkpoints"

# --- Evaluation ---
evaluation:
  track_d_loss: true
  track_spoofing_rate: true
  track_diversity_score: true
  track_ppl: true
  num_eval_samples: 50
  min_unique_tokens_ratio: 0.3

# --- Data ---
data:
  dataset_path: "data/processed_c4.jsonl"
  max_prompt_length: 128
  num_prompts: 5000
