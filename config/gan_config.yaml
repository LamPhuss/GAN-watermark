# ============================================================
# Watermark GAN Configuration (MC Search + UPV Detector)
# ============================================================

# --- Model Paths ---
model:
  llm_name: "facebook/opt-1.3b"
  device: "cuda"
  upv_config_path: "upv/UPV.json"
  upv_generator_weights: "upv/model/generator_model_b16_p1.pt"
  upv_detector_weights: "upv/model/detector_model_b16_p1_z4.pt"

# --- UPV Watermark Parameters ---
watermark:
  gamma: 0.5
  delta: 2.0
  z_threshold: 4.0
  prefix_length: 1
  bit_number: 16
  sigma: 0.01
  default_top_k: 20

# --- UPV Discriminator (Original UPV Detector) ---
# The original UPV Detector is used as D to make it ROBUST.
# binary_classifier (shared embedding) stays FROZEN.
# Only LSTM + FC layers are trained during adversarial phase.
discriminator:
  bit_number: 16                  # Must match UPV config
  freeze_embedding: true          # CRITICAL: keep binary_classifier frozen
  
  # Pre-training on real watermark (1) vs natural text (0)
  pretrain_epochs: 20
  pretrain_lr: 0.001
  pretrain_batch_size: 32
  pretrain_num_samples: 5000      # 5k real + 5k natural

# --- Attacker (LLM with LoRA) ---
attacker:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"
  
  pretrain_epochs: 3
  pretrain_lr: 0.0002
  pretrain_batch_size: 4
  pretrain_num_samples: 5000
  pretrain_max_length: 256
  
  learning_mode: "fast"
  learning_num_queries: 1000
  prevctx_width: 1

# --- Monte Carlo Search ---
monte_carlo:
  num_chunks: 4                   # Divide sequence into K chunks
  num_rollouts: 3                 # N rollouts per chunk boundary
  batch_size: 4                   # Batch size during MC generation
                                  # (smaller than adversarial batch due to
                                  #  N×K extra forward passes per sample)
  rollout_policy: "static_spoofer"  # "static_spoofer" or "attacker"

# --- Adversarial Training ---
adversarial:
  num_epochs: 100
  max_gen_length: 200             # Tokens to generate (not total seq length)
  
  # Discriminator update
  d_steps_per_epoch: 1
  d_lr: 0.0005                    # Higher LR for UPV detector (small model)

  # Attacker (Generator) update - MC Policy Gradient  
  g_steps_per_epoch: 1
  g_lr: 0.00005
  
  # Reward
  lambda_reward: 1.0
  lambda_ppl: 0.1
  reward_baseline: 0.5
  
  # Generation
  temperature: 1.0
  
  # Checkpointing
  eval_every: 5
  checkpoint_every: 10
  checkpoint_dir: "checkpoints"

# --- Evaluation ---
evaluation:
  track_d_loss: true
  track_spoofing_rate: true
  track_diversity_score: true
  track_ppl: true
  num_eval_samples: 50
  min_unique_tokens_ratio: 0.3

# --- Data ---
data:
  dataset_path: "data/processed_c4.jsonl"
  max_prompt_length: 128
  num_prompts: 5000
