# ============================================================
# Watermark GAN Configuration — KGW-SelfHash version
# ============================================================

model:
  llm_name: "facebook/opt-1.3b"
  device: "cuda"

# --- KGW Watermark Parameters ---
watermark:
  gamma: 0.25
  delta: 2.0
  context_width: 4        # h=3 + self-seeding → 4-gram
  hash_key: 15485863
  z_threshold: 4.0

# --- Discriminator (z-score based, NON-trainable) ---
discriminator:
  mode: "zscore"
  z_center: 2.0
  temperature: 2.0

# --- Attacker (LLM with LoRA) ---
attacker:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"

  pretrain_epochs: 3
  pretrain_lr: 0.0002
  pretrain_batch_size: 4
  pretrain_num_samples: 10000
  pretrain_max_length: 256

  learning_mode: "fast"
  learning_num_queries: 10000
  prevctx_width: 3
  spoofer_strength: 7.5

# --- Monte Carlo Search ---
monte_carlo:
  num_chunks: 4
  num_rollouts: 3
  batch_size: 4
  rollout_policy: "static_spoofer"

# --- Adversarial Training ---
adversarial:
  num_epochs: 100
  max_gen_length: 200

  d_steps_per_epoch: 0     # D is z-score → no training
  d_lr: 0.0

  g_steps_per_epoch: 1
  g_lr: 0.00005

  lambda_reward: 1.0
  lambda_ppl: 0.1
  reward_baseline: 0.5
  temperature: 1.0

  eval_every: 5
  checkpoint_every: 10
  checkpoint_dir: "checkpoints"

  d_label_smoothing: 0.0
  diversity_reward_weight: 0.05

# --- Data ---
data:
  dataset_path: "data/large_dataset.jsonl"
  max_prompt_length: 128
  num_prompts: 10000
